{% extends "common/base.html" %}
{% block title %}Crédits — Admin COFINANCE CI{% endblock %}

{% block content %}
<div class="container">
  <div class="card-header" style="margin-bottom:1rem;">
    <h1 style="font-size:1.2rem;color:#1a1a2e;">Gestion des crédits</h1>
    <a href="/admin/reports/" class="btn btn-neutral btn-sm">📥 Exporter CSV</a>
  </div>

  <!-- Filtres -->
  <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;">
    <button class="btn btn-sm btn-primary" data-s=""           onclick="filter(this,'')">Tous</button>
    <button class="btn btn-sm btn-neutral" data-s="SOUMISE"    onclick="filter(this,'SOUMISE')">Soumises</button>
    <button class="btn btn-sm btn-neutral" data-s="EN_ANALYSE" onclick="filter(this,'EN_ANALYSE')">En analyse</button>
    <button class="btn btn-sm btn-neutral" data-s="APPROUVEE"  onclick="filter(this,'APPROUVEE')">Approuvées</button>
    <button class="btn btn-sm btn-neutral" data-s="DECAISSEE"  onclick="filter(this,'DECAISSEE')">Décaissées</button>
    <button class="btn btn-sm btn-neutral" data-s="REFUSEE"    onclick="filter(this,'REFUSEE')">Refusées</button>
    <button class="btn btn-sm btn-neutral" data-s="SOLDEE"     onclick="filter(this,'SOLDEE')">Soldées</button>
  </div>

  <!-- Recherche rapide -->
  <div class="form-group" style="max-width:320px;margin-bottom:1rem;">
    <input type="text" id="search" placeholder="Rechercher par client…" oninput="search(this.value)">
  </div>

  <div class="card">
    <div id="content"><div class="loading">Chargement</div></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let all = [];
let currentStatus = '';

async function load() {
  const res = await apiFetch('/api/credits/');
  all = await res.json();
  render(all);
}

function render(data) {
  const el = document.getElementById('content');
  if (!data.length) {
    el.innerHTML = '<p style="color:#888;">Aucun crédit.</p>';
    return;
  }
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Client</th><th>Région</th><th>Montant</th><th>Durée</th><th>Score</th><th>Soumis le</th><th>Statut</th><th>Agent</th><th></th></tr>
        </thead>
        <tbody>
          ${data.map(c => `
            <tr>
              <td>#${c.id}</td>
              <td><strong>${c.client_detail?.username || '—'}</strong></td>
              <td>${c.client_detail?.region || '—'}</td>
              <td>${fmtMoney(c.montant)}</td>
              <td>${c.duree_mois} mois</td>
              <td>${c.score ?? '—'}</td>
              <td>${fmtDate(c.date_soumission)}</td>
              <td>${badge(c.status)}</td>
              <td>${c.agent_detail?.username || '<span style="color:#aaa;">—</span>'}</td>
              <td><a href="/admin/credits/${c.id}/" class="btn btn-sm btn-neutral">Voir</a></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function filter(btn, status) {
  currentStatus = status;
  document.querySelectorAll('[data-s]').forEach(b => b.className = 'btn btn-sm btn-neutral');
  btn.className = 'btn btn-sm btn-primary';
  const filtered = status ? all.filter(c => c.status === status) : all;
  const query    = document.getElementById('search').value.toLowerCase();
  render(query ? filtered.filter(c => c.client_detail?.username?.toLowerCase().includes(query)) : filtered);
}

function search(query) {
  const base    = currentStatus ? all.filter(c => c.status === currentStatus) : all;
  render(query ? base.filter(c => c.client_detail?.username?.toLowerCase().includes(query.toLowerCase())) : base);
}

load();
</script>
{% endblock %}
