{% extends "common/base.html" %}
{% block title %}Utilisateurs — Admin COFINANCE CI{% endblock %}

{% block content %}
<div class="container">
  <div class="card-header" style="margin-bottom:1rem;">
    <h1 style="font-size:1.2rem;color:#1a1a2e;">Gestion des utilisateurs</h1>
  </div>

  <!-- Filtres -->
  <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;">
    <button class="btn btn-sm btn-primary" data-r=""       onclick="filter(this,'')">Tous</button>
    <button class="btn btn-sm btn-neutral" data-r="CLIENT" onclick="filter(this,'CLIENT')">Clients</button>
    <button class="btn btn-sm btn-neutral" data-r="AGENT"  onclick="filter(this,'AGENT')">Agents</button>
    <button class="btn btn-sm btn-neutral" data-r="ADMIN"  onclick="filter(this,'ADMIN')">Admins</button>
    <input type="text" id="search" placeholder="Rechercher…" oninput="search(this.value)"
      style="margin-left:.5rem;padding:.38rem .7rem;border:1px solid #ccc;border-radius:6px;font-size:.85rem;max-width:220px;">
  </div>

  <div class="card">
    <div id="content"><div class="loading">Chargement</div></div>
  </div>
</div>

<!-- Modal toggle actif/inactif -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:10px;padding:1.5rem;width:100%;max-width:400px;margin:1rem;">
    <h3 id="modal-title" style="font-size:1rem;margin-bottom:.75rem;color:#1a1a2e;"></h3>
    <p id="modal-msg" style="font-size:.88rem;color:#555;margin-bottom:1rem;"></p>
    <div style="display:flex;gap:.75rem;">
      <button class="btn btn-danger" id="modal-confirm">Confirmer</button>
      <button class="btn btn-neutral" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let all = [];
let currentRole = '';
let pendingUserId   = null;
let pendingIsActive = null;

async function load() {
  const res = await apiFetch('/api/auth/users/');
  all = await res.json();
  render(all);
}

function render(data) {
  const el = document.getElementById('content');
  if (!data.length) {
    el.innerHTML = '<p style="color:#888;">Aucun utilisateur.</p>';
    return;
  }
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Nom d'utilisateur</th><th>Email</th><th>Rôle</th><th>Région</th><th>Téléphone</th><th>Inscription</th><th>Statut</th><th></th></tr>
        </thead>
        <tbody>
          ${data.map(u => `
            <tr>
              <td>#${u.id}</td>
              <td><strong>${u.username}</strong></td>
              <td>${u.email || '—'}</td>
              <td><span class="badge" style="background:#e3f2fd;color:#1565c0;">${u.role}</span></td>
              <td>${u.region || '—'}</td>
              <td>${u.phone || '—'}</td>
              <td>${fmtDate(u.date_joined)}</td>
              <td>
                ${u.is_active
                  ? '<span class="badge status-ACTIVE">Actif</span>'
                  : '<span class="badge status-REFUSEE">Inactif</span>'}
              </td>
              <td>
                <button class="btn btn-sm ${u.is_active ? 'btn-danger' : 'btn-success'}"
                  onclick="openToggle(${u.id}, '${u.username}', ${u.is_active})">
                  ${u.is_active ? 'Désactiver' : 'Réactiver'}
                </button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function filter(btn, role) {
  currentRole = role;
  document.querySelectorAll('[data-r]').forEach(b => b.className = 'btn btn-sm btn-neutral');
  btn.className = 'btn btn-sm btn-primary';
  const filtered = role ? all.filter(u => u.role === role) : all;
  const query    = document.getElementById('search').value.toLowerCase();
  render(query ? filtered.filter(u => u.username.toLowerCase().includes(query)) : filtered);
}

function search(query) {
  const base = currentRole ? all.filter(u => u.role === currentRole) : all;
  render(query ? base.filter(u => u.username.toLowerCase().includes(query.toLowerCase())) : base);
}

// ── Toggle actif/inactif ──────────────────────────────────
function openToggle(id, username, isActive) {
  pendingUserId   = id;
  pendingIsActive = isActive;
  const overlay = document.getElementById('modal-overlay');
  overlay.style.display = 'flex';
  document.getElementById('modal-title').textContent =
    isActive ? `Désactiver ${username}` : `Réactiver ${username}`;
  document.getElementById('modal-msg').textContent =
    isActive
      ? `L'utilisateur ne pourra plus se connecter. Confirmer ?`
      : `L'utilisateur pourra à nouveau se connecter. Confirmer ?`;
  document.getElementById('modal-confirm').className =
    `btn ${isActive ? 'btn-danger' : 'btn-success'}`;
  document.getElementById('modal-confirm').textContent =
    isActive ? 'Désactiver' : 'Réactiver';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  pendingUserId   = null;
  pendingIsActive = null;
}

document.getElementById('modal-confirm').addEventListener('click', async () => {
  const btn = document.getElementById('modal-confirm');
  btn.disabled = true;

  const res = await apiFetch(`/api/auth/users/${pendingUserId}/toggle/`, { method: 'POST' });

  if (res.ok) {
    flash(`Utilisateur ${pendingIsActive ? 'désactivé' : 'réactivé'}.`, 'success');
    closeModal();
    load();
  } else {
    flash('Erreur lors de la mise à jour.', 'error');
    btn.disabled = false;
  }
});

load();
</script>
{% endblock %}
