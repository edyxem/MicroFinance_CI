{% extends "common/base.html" %}
{% block title %}Mon profil — COFINANCE CI{% endblock %}

{% block content %}
<div class="container-sm">
  <h1 style="font-size:1.2rem;color:#1a1a2e;margin-bottom:1rem;">Mon profil</h1>
  <div id="msg"></div>

  <div class="card">
    <h2>Informations personnelles</h2>
    <div id="profile-loading"><div class="loading">Chargement</div></div>

    <div id="profile-form" style="display:none;">
      <div class="form-row">
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <input type="text" id="username" disabled style="background:#f5f5f5;color:#888;">
        </div>
        <div class="form-group">
          <label>Rôle</label>
          <input type="text" id="role" disabled style="background:#f5f5f5;color:#888;">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="first_name" placeholder="Prénom">
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="last_name" placeholder="Nom">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="email@exemple.com">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="text" id="phone" placeholder="+225 07 00 00 00 00">
        </div>
      </div>
      <div class="form-group">
        <label>Région</label>
        <select id="region">
          <option value="">— Choisir —</option>
          <option>Abidjan</option>
          <option>Bouaké</option>
          <option>Yamoussoukro</option>
          <option>San-Pédro</option>
          <option>Korhogo</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btn-save">Enregistrer</button>
    </div>
  </div>

  <!-- Historique des connexions -->
  <div class="card">
    <h2>Historique des connexions</h2>
    <div id="history-content"><div class="loading">Chargement</div></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadProfile() {
  const res  = await apiFetch('/api/auth/profile/');
  const data = await res.json();

  document.getElementById('profile-loading').style.display = 'none';
  document.getElementById('profile-form').style.display    = '';

  document.getElementById('username').value   = data.username;
  document.getElementById('role').value       = data.role;
  document.getElementById('first_name').value = data.first_name || '';
  document.getElementById('last_name').value  = data.last_name  || '';
  document.getElementById('email').value      = data.email      || '';
  document.getElementById('phone').value      = data.phone      || '';
  document.getElementById('region').value     = data.region     || '';
}

document.getElementById('btn-save').addEventListener('click', async () => {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';
  const msg = document.getElementById('msg');
  msg.innerHTML = '';

  try {
    const res  = await apiFetch('/api/auth/profile/', {
      method: 'PUT',
      body: JSON.stringify({
        first_name: document.getElementById('first_name').value,
        last_name:  document.getElementById('last_name').value,
        email:      document.getElementById('email').value,
        phone:      document.getElementById('phone').value,
        region:     document.getElementById('region').value,
      })
    });
    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = `<div class="alert alert-error">${Object.values(data).flat().join(' ')}</div>`;
      return;
    }

    // Mettre à jour le localStorage
    const u = getUser();
    localStorage.setItem('user', JSON.stringify({ ...u, ...data }));
    msg.innerHTML = '<div class="alert alert-success">Profil mis à jour !</div>';

  } catch {
    msg.innerHTML = '<div class="alert alert-error">Erreur réseau.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enregistrer';
  }
});

async function loadHistory() {
  const res  = await apiFetch('/api/auth/profile/history/');
  const data = await res.json();
  const el   = document.getElementById('history-content');

  if (!data.length) {
    el.innerHTML = '<p style="color:#888;font-size:.88rem;">Aucun historique disponible.</p>';
    return;
  }

  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Date / Heure</th><th>Adresse IP</th></tr></thead>
        <tbody>
          ${data.slice(0, 10).map(h => `
            <tr>
              <td>${fmtDatetime(h.logged_at)}</td>
              <td>${h.ip_address || '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

loadProfile();
loadHistory();
</script>
{% endblock %}
