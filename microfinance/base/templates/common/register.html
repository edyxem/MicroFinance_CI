{% extends "common/base.html" %}
{% block title %}Inscription — COFINANCE CI{% endblock %}

{% block content %}
<div class="container-sm">
  <div class="card" style="margin-top:2rem;">
    <h2>Créer un compte</h2>
    <div id="msg"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Nom d'utilisateur *</label>
        <input type="text" id="username" placeholder="ex: kouame_jean">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@exemple.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Mot de passe *</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe *</label>
        <input type="password" id="password2" placeholder="••••••••">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Téléphone</label>
        <input type="text" id="phone" placeholder="+225 07 00 00 00 00">
      </div>
      <div class="form-group">
        <label>Région</label>
        <select id="region">
          <option value="">— Choisir —</option>
          <option>Abidjan</option>
          <option>Bouaké</option>
          <option>Yamoussoukro</option>
          <option>San-Pédro</option>
          <option>Korhogo</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary btn-block" id="btn-register">Créer mon compte</button>

    <p style="text-align:center;margin-top:1rem;font-size:.85rem;">
      Déjà un compte ? <a href="/login/">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('btn-register').addEventListener('click', async () => {
  const msg  = document.getElementById('msg');
  msg.innerHTML = '';

  const username  = document.getElementById('username').value.trim();
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const phone     = document.getElementById('phone').value.trim();
  const region    = document.getElementById('region').value;

  if (!username || !password) {
    msg.innerHTML = '<div class="alert alert-error">Nom d\'utilisateur et mot de passe obligatoires.</div>';
    return;
  }
  if (password !== password2) {
    msg.innerHTML = '<div class="alert alert-error">Les mots de passe ne correspondent pas.</div>';
    return;
  }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Inscription…';

  try {
    const res  = await fetch('/api/auth/register/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password, password2, phone, region })
    });
    const data = await res.json();

    if (!res.ok) {
      const lignes = Object.entries(data)
        .map(([champ, msgs]) => `<strong>${champ}</strong> : ${[].concat(msgs).join(' ')}`)
        .join('<br>');
      msg.innerHTML = `<div class="alert alert-error">${lignes}</div>`;
      return;
    }

    msg.innerHTML = '<div class="alert alert-success">Compte créé ! Redirection vers la connexion…</div>';
    setTimeout(() => window.location.href = '/login/', 1500);

  } catch (e) {
    msg.innerHTML = '<div class="alert alert-error">Impossible de contacter le serveur.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Créer mon compte';
  }
});
</script>
{% endblock %}
